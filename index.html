<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agila Financial Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#232635;--border:#2e3347;--text:#f0f0f0;--muted:#6b7280;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--orange:#f97316}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:0;margin:0;min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:0 12px 80px}
h1{font-size:16px;font-weight:600;padding:16px 0 12px;border-bottom:1px solid var(--border);margin-bottom:12px}
.nav{display:flex;gap:0;overflow-x:auto;padding:0;border-bottom:1px solid var(--border);margin-bottom:16px;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav button{flex-shrink:0;padding:10px 14px;background:none;border:none;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px}
.nav button.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab{display:none}
.tab.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
.card h3{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px}
.value{font-size:22px;font-weight:700}
.positive{color:var(--green)}
.negative{color:var(--red)}
.warning{color:var(--yellow)}
.sub{font-size:11px;color:var(--muted);margin-top:3px}
.section-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px}
.tx-list{display:flex;flex-direction:column;gap:6px}
.tx-row{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer}
.tx-row:hover{background:var(--surface2)}
.tx-main{display:flex;justify-content:space-between;align-items:center;gap:8px}
.tx-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tx-date{font-size:11px;color:var(--muted);white-space:nowrap}
.tx-desc{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-amount{font-size:13px;font-weight:600;white-space:nowrap}
.tx-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;font-family:monospace;margin-top:4px}
.tx-detail{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);display:none;line-height:1.5}
.bank-chip{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;background:var(--surface2);color:var(--muted);margin-left:4px}
.filter-bar{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.filter-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;cursor:pointer;white-space:nowrap}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-sel{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px}
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.chart-wrap-lg{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px;height:520px;position:relative}
.chart-wrap-lg canvas{position:absolute;inset:12px;width:calc(100% - 24px)!important;height:calc(100% - 24px)!important;max-height:none!important}
.exp-filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;align-items:end;margin-bottom:10px}
.exp-filters label{display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.exp-filters input,.exp-filters select{padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;width:100%;min-width:0}
.exp-filters .search-cell{grid-column:1/-1}
.inv-table{width:100%;border-collapse:collapse}
.inv-table th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--border)}
.inv-table td{padding:9px 10px;font-size:13px;border-bottom:1px solid #1e2130}
.inv-table tr:last-child td{border-bottom:none}
.amount{text-align:right;font-weight:600}
.status-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px}
.status-paid{background:rgba(34,197,94,.15);color:var(--green)}
.status-overdue{background:rgba(239,68,68,.15);color:var(--red)}
.status-draft{background:rgba(107,114,128,.15);color:var(--muted)}
.status-posted{background:rgba(59,130,246,.15);color:var(--accent)}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
.error-msg{background:rgba(239,68,68,.1);border:1px solid var(--red);border-radius:8px;padding:12px;color:var(--red);font-size:13px;margin:12px 0}
.vat-big{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;margin-bottom:12px}
.vat-big .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px}
.vat-big .amount-val{font-size:36px;font-weight:700}
.vat-big .sub{font-size:12px;color:var(--muted);margin-top:4px}
.deadline{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.deadline .dl-row{display:flex;justify-content:space-between;align-items:center}
.deadline .dl-label{font-size:12px;color:var(--muted)}
.deadline .dl-value{font-size:15px;font-weight:600}
.deadline .dl-sub{font-size:11px;color:var(--muted);margin-top:2px}
.cat-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.cat-table th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:10px 12px;background:var(--surface2);border-bottom:1px solid var(--border)}
.cat-table td{padding:9px 12px;font-size:13px;border-bottom:1px solid var(--border)}
.cat-table tr:last-child td{border-bottom:none}
.tab-nav{display:none}
.loading{text-align:center;padding:40px;color:var(--muted)}
@media (max-width:480px){
  .app{padding:0 8px 80px}
  h1{font-size:15px;padding:14px 0 10px}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .card{padding:12px}
  .value{font-size:18px}
  .chart-wrap-lg{height:360px;padding:8px}
  .chart-wrap-lg canvas{inset:8px;width:calc(100% - 16px)!important;height:calc(100% - 16px)!important}
  .exp-filters{grid-template-columns:1fr 1fr}
  .exp-filters .search-cell{grid-column:1/-1}
  .nav button{padding:8px 10px;font-size:12px}
  .inv-table th,.inv-table td,.cat-table th,.cat-table td{padding:6px 6px;font-size:12px}
}
.sync-btn{display:block;width:100%;padding:10px;margin-bottom:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.sync-btn:disabled{opacity:.6;cursor:default}
.sync-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--accent);background:rgba(59,130,246,.1);color:var(--accent);font-size:12px;font-weight:500;cursor:pointer;margin-bottom:12px}
.sync-btn:hover{background:rgba(59,130,246,.2)}
.sync-btn:disabled{opacity:0.5;cursor:not-allowed}
</style>
</head>
<body>
<div class="app">
<h1>Agila Consulting - Financial Dashboard</h1>

<nav class="nav" id="nav"></nav>
<div id="tab-overview"  class="tab"></div>
<div id="tab-revenue"   class="tab"></div>
<div id="tab-expenses"  class="tab"></div>
<div id="tab-vat"       class="tab"></div>
<div id="tab-bank"      class="tab"></div>
<div id="tab-documents" class="tab"></div>
</div>

<script>
var TABS = [
  {id:"overview",  label:"Overview"},
  {id:"revenue",   label:"Revenue"},
  {id:"expenses",  label:"Expenses"},
  {id:"vat",       label:"VAT"},
  {id:"bank",      label:"Reconciliation"},
  {id:"documents",  label:"Documents"},
];
var activeTab = null;
var dataCache = {};

function init() {
  var nav = document.getElementById("nav");
  TABS.forEach(function(t) {
    var b = document.createElement("button");
    b.id = "btn-" + t.id;
    b.textContent = t.label;
    b.onclick = function(){ switchTab(t.id); };
    nav.appendChild(b);
  });
  switchTab("overview");
}

async function switchTab(id) {
  if (activeTab === id) return;
  document.querySelectorAll(".nav button").forEach(function(b){b.classList.remove("active")});
  document.getElementById("btn-" + id).classList.add("active");
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active")});
  document.getElementById("tab-" + id).classList.add("active");
  activeTab = id;
  if (!dataCache[id]) {
    document.getElementById("tab-" + id).textContent = "Loading...";
    await loadTab(id);
    dataCache[id] = true;
  }
}

async function loadTab(id) {
  try {
    if (id === "overview") await loadOverview();
    else if (id === "revenue") await loadRevenue();
    else if (id === "expenses") await loadExpenses();
    else if (id === "vat") await loadVAT();
    else if (id === "bank") await loadBank();
    else if (id === "documents") await loadDocuments();
  } catch(e) {
    document.getElementById("tab-" + id).textContent = "Failed: " + e.message;
  }
}

function eur(n) { return (n||0).toLocaleString("de",{minimumFractionDigits:2}); }

function h(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function setHTML(el, html) {
  if (typeof el === "string") el = document.getElementById(el);
  el.innerHTML = html;
}

async function triggerSync() {
  var btn = document.getElementById("sync-btn");
  if (btn) { btn.disabled = true; btn.textContent = "Syncing..."; }
  try {
    await fetch("/api/sync/odoo", {method:"POST"}).then(function(r){return r.json()});
    await fetch("/api/sync/onedrive", {method:"POST"}).then(function(r){return r.json()});
    await fetch("/api/sync/telegram", {method:"POST"}).then(function(r){return r.json()});
    await fetch("/api/reconcile", {method:"POST"}).then(function(r){return r.json()});
    if (btn) btn.textContent = "Sync Complete";
    dataCache = {};
    setTimeout(function(){ if(btn){ btn.textContent = "Sync Now"; btn.disabled = false; }}, 2000);
    await loadOverview();
  } catch(e) {
    if (btn) { btn.textContent = "Sync Failed"; btn.disabled = false; }
  }
}

async function loadOverview() {
  var results = await Promise.all([
    fetch("/api/summary").then(function(r){return r.json()}),
    fetch("/api/reconciliation").then(function(r){return r.json()}),
  ]);
  var sum = results[0], recon = results[1];
  var el = document.getElementById("tab-overview");
  var pct = recon.summary ? recon.summary.matched_pct||0 : 0;
  var mc = pct>=70?"positive":pct>=50?"warning":"negative";
  var outstanding = sum.outstanding_invoices || [];
  var outRows = outstanding.map(function(inv) {
    return '<div class="tx-row" style="border-left:3px solid var(--orange)">' +
      '<div class="tx-main"><div class="tx-left"><span class="dot" style="background:var(--orange)"></span>' +
      '<span class="tx-desc">' + h(inv.name) + ' - ' + h(inv.client) + '</span></div>' +
      '<span class="tx-amount negative">EUR ' + eur(inv.amount_residual || inv.amount_gross) + '</span></div>' +
      '<div style="margin-top:2px;font-size:11px;color:var(--muted)">Due: ' + h(inv.due_date||"N/A") + '</div></div>';
  }).join("");

  setHTML(el,
    '<button class="sync-btn" id="sync-btn" onclick="triggerSync()">Sync Now</button>' +
    '<div class="kpi-grid">' +
      '<div class="card"><h3>Revenue YTD</h3><div class="value positive">EUR ' + eur(sum.q1_2026_revenue) + '</div><div class="sub">Q1 2026</div></div>' +
      '<div class="card"><h3>Expenses YTD</h3><div class="value">EUR ' + eur(sum.q1_2026_expenses) + '</div><div class="sub">Q1 2026</div></div>' +
      '<div class="card"><h3>Net Profit</h3><div class="value positive">EUR ' + eur(sum.net_profit_estimate) + '</div><div class="sub">Q1 2026 est.</div></div>' +
      '<div class="card"><h3>Match Rate</h3><div class="value ' + mc + '">' + pct.toFixed(0) + '%</div><div class="sub">' + (recon.summary?recon.summary.matched||0:'?') + ' / ' + (recon.summary?recon.summary.total||0:'?') + ' txns</div></div>' +
    '</div>' +
    '<div class="deadline">' +
      '<div class="dl-row">' +
        '<div><div class="dl-label">Q1 VAT Filing Deadline</div><div class="dl-sub">15 June 2026</div></div>' +
        '<div class="dl-value warning">64 days</div>' +
      '</div>' +
    '</div>' +
    '<div class="kpi-grid">' +
      '<div class="card"><h3>VAT Position</h3><div class="value">EUR ' + eur(sum.net_vat_due) + '</div><div class="sub">' + ((sum.net_vat_due||0)>=0?'payable':'reclaimable') + '</div></div>' +
      '<div class="card"><h3>Outstanding</h3><div class="value warning">EUR ' + eur(sum.invoiced_not_received) + '</div><div class="sub">' + outstanding.length + ' invoice(s)</div></div>' +
    '</div>' +
    (outstanding.length > 0 ? '<div class="section-title">Outstanding Invoices</div><div class="tx-list">' + outRows + '</div>' : ''));
}

async function loadRevenue() {
  var rev = await fetch("/api/revenue").then(function(r){return r.json()});
  var el = document.getElementById("tab-revenue");
  var mt = rev.monthly_totals || {};
  var monthKeys = Object.keys(mt).sort();
  var monthData = monthKeys.map(function(k){ return mt[k]; });

  var rows = (rev.invoices||[]).map(function(inv) {
    return '<tr><td>' + h(inv.name||"--") + '</td><td>' + h(inv.date||"--") + '</td><td>' + h(inv.client||inv.client_supplier_name||"--") + '</td><td class="amount">EUR ' + eur(inv.amount_gross) + '</td><td><span class="status-badge status-' + h(inv.status||'draft') + '">' + h(inv.status||'draft') + '</span></td></tr>';
  }).join("");

  setHTML(el, '<div class="chart-wrap"><canvas id="revChart"></canvas></div><div class="section-title">Invoices</div><table class="inv-table"><thead><tr><th>Invoice</th><th>Date</th><th>Client</th><th class="amount">Amount</th><th>Status</th></tr></thead><tbody>' + rows + '</tbody></table>');

  if (monthKeys.length) {
    new Chart(document.getElementById("revChart"), {
      type:"bar",
      data:{labels:monthKeys,datasets:[{label:"Revenue (EUR)",data:monthData,backgroundColor:"#3b82f6"}]},
      options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{color:"#6b7280"}},x:{ticks:{color:"#6b7280"}}}}
    });
  }
}

async function loadExpenses() {
  var vatRes = await Promise.all([
    fetch("/api/expenses?limit=500").then(function(r){return r.json()}),
    fetch("/api/vat").then(function(r){return r.json()}),
  ]);
  var exp = vatRes[0];
  var vat = vatRes[1];
  var el = document.getElementById("tab-expenses");

  var cats = exp.categories||[];
  var expenses = exp.expenses||[];

  // Compute summary KPIs
  var now = new Date();
  var curYear = now.getFullYear();
  var curMonth = now.getMonth()+1;
  var curQ = "Q" + Math.ceil(curMonth/3);

  // Filter to current quarter for period totals
  var qCatTotals = {};
  var qTotal = 0, qRecoverable = 0, qNonRecoverable = 0;
  expenses.forEach(function(e) {
    var d = new Date(e.date);
    if (d.getFullYear() == curYear) {
      var eq = "Q" + Math.ceil((d.getMonth()+1)/3);
      if (eq == curQ) {
        var net = parseFloat(e.amount)||0;
        var vatAmt = parseFloat(e.amount_vat)||0;
        var rec = parseFloat(e.vat_recoverable)||0;
        qTotal += net + vatAmt;
        qRecoverable += rec;
        qNonRecoverable += (vatAmt - rec);
      }
    }
  });

  // Find top category (by total net+ VAT in current quarter)
  var catTotalsQ = {};
  expenses.forEach(function(e) {
    var d = new Date(e.date);
    if (d.getFullYear() == curYear) {
      var eq = "Q" + Math.ceil((d.getMonth()+1)/3);
      if (eq == curQ) {
        var cat = e.category||'other';
        catTotalsQ[cat] = (catTotalsQ[cat]||0) + (parseFloat(e.amount)||0) + (parseFloat(e.amount_vat)||0);
      }
    }
  });
  var topCat = Object.entries(catTotalsQ).sort(function(a,b){return b[1]-a[1]})[0];

  // Category summary rows
  var catRows = cats.map(function(c) {
    var recColor = (c.vat_recoverable||0)>0 ? "var(--green)" : "var(--red)";
    var nonRecColor = (c.non_deductible||0)>0 ? "var(--red)" : "var(--muted)";
    return '<tr><td>' + h(c.category||'?') + '</td><td class="amount">EUR ' + eur(c.total) + '</td>' +
      '<td class="amount">' + ((c.vat_rate||0)*100).toFixed(0) + '%</td>' +
      '<td class="amount" style="color:' + recColor + '">EUR ' + eur(c.vat_recoverable||0) + '</td>' +
      '<td class="amount" style="color:' + nonRecColor + '">EUR ' + eur(c.non_deductible||0) + '</td></tr>';
  }).join("");

  // Distinct categories from the full dataset
  var catSet = {};
  expenses.forEach(function(e){ if (e.category) catSet[e.category] = true; });
  var catList = Object.keys(catSet).sort();

  var qMonths = 1; // partial quarter

  var stackCatPills = catList.map(function(c){
    return '<button class="filter-btn stack-cat-pill" data-cat="'+h(c)+'" onclick="toggleStackCat(this)">'+h(c)+'</button>';
  }).join('');

  setHTML(el,
    '<div class="kpi-grid" style="margin-bottom:12px">' +
      '<div class="card"><h3>Total Expenses</h3><div class="value">EUR ' + eur(qTotal) + '</div><div class="sub">' + h(curQ) + ' ' + curYear + '</div></div>' +
      '<div class="card"><h3>Avg per Month</h3><div class="value">EUR ' + eur(qTotal/qMonths) + '</div><div class="sub">Q avg</div></div>' +
      '<div class="card"><h3>Top Category</h3><div class="value" style="font-size:18px">' + h(topCat?topCat[0]:'—') + '</div><div class="sub">EUR ' + eur(topCat?topCat[1]:0) + '</div></div>' +
      '<div class="card"><h3>VAT Recoverable</h3><div class="value positive">EUR ' + eur(vat.current_quarter?vat.current_quarter.input_vat:0) + '</div><div class="sub">EU refund pending: EUR ' + eur(vat.eu_refund_pending_total||0) + '</div></div>' +
    '</div>' +

    '<div class="section-title">Filters</div>' +
    '<div class="exp-filters">' +
      '<label>From<input type="date" id="expDateFrom" onchange="applyExpFilters()"></label>' +
      '<label>To<input type="date" id="expDateTo" onchange="applyExpFilters()"></label>' +
      '<label>Quick range<select id="expQuickRange" onchange="setExpQuickRange(this.value)">' +
        '<option value="">Custom</option>' +
        '<option value="30">Last 30 days</option>' +
        '<option value="90">Last 90 days</option>' +
        '<option value="ytd">Year to date</option>' +
        '<option value="thisq">This quarter</option>' +
        '<option value="lastq">Last quarter</option>' +
        '<option value="all">All time</option>' +
      '</select></label>' +
      '<label class="search-cell">Search<input id="expSearch" oninput="applyExpFilters()" placeholder="Vendor, notes, description, email..."></label>' +
    '</div>' +
    '<div class="filter-bar" id="expCatPills">' +
      '<button class="filter-btn active" onclick="clearExpCats(this)">All</button>' +
      stackCatPills +
      '<span style="width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0"></span>' +
      '<button class="filter-btn stack-grp-btn" data-grp="weekly" onclick="setStackGrouping(\'weekly\')">Weekly</button>' +
      '<button class="filter-btn stack-grp-btn active" data-grp="monthly" onclick="setStackGrouping(\'monthly\')">Monthly</button>' +
      '<button class="filter-btn stack-grp-btn" data-grp="quarterly" onclick="setStackGrouping(\'quarterly\')">Quarterly</button>' +
      '<button class="filter-btn stack-grp-btn" data-grp="yearly" onclick="setStackGrouping(\'yearly\')">Yearly</button>' +
    '</div>' +

    '<div class="section-title">Expenses by Category over Time</div>' +
    '<div class="chart-wrap-lg"><canvas id="expStackChart"></canvas></div>' +

    '<div class="filter-bar">' +
      '<select class="filter-sel" id="expViewSel" onchange="setExpView(this.value)">' +
        '<option value="table">Table</option>' +
        '<option value="chart">Bar Chart</option>' +
        '<option value="category">By Category</option>' +
      '</select>' +
    '</div>' +

    '<div class="chart-wrap" id="expChartWrap" style="display:none"><canvas id="expChart"></canvas></div>' +

    '<div id="expTableWrap">' +
      '<div id="expCountLine" style="font-size:12px;color:var(--muted);margin-bottom:8px"></div>' +
      '<div style="overflow-x:auto">' +
      '<table class="cat-table" id="expTable"><thead><tr>' +
        '<th>Date</th>' +
        '<th>Vendor</th>' +
        '<th>Category</th>' +
        '<th class="amount">Net</th>' +
        '<th class="amount">VAT</th>' +
        '<th class="amount">Recoverable</th>' +
        '<th>Source</th>' +
      '</tr></thead><tbody id="expTableBody"></tbody></table></div>' +
    '</div>' +

    '<div id="expCategoryWrap" style="display:none">' +

function setExpQuickRange(val) {
  if (!val) return;
  var today = new Date();
  var toStr = today.toISOString().slice(0,10);
  var fromStr = "";
  if (val === "30" || val === "90") {
    var d = new Date(today);
    d.setDate(d.getDate() - parseInt(val,10));
    fromStr = d.toISOString().slice(0,10);
  } else if (val === "ytd") {
    fromStr = today.getFullYear() + "-01-01";
  } else if (val === "thisq") {
    var q = Math.floor(today.getMonth()/3);
    var m = q*3 + 1;
    fromStr = today.getFullYear() + "-" + String(m).padStart(2,'0') + "-01";
  } else if (val === "lastq") {
    var curQ = Math.floor(today.getMonth()/3);
    var lastQ = curQ - 1;
    var y = today.getFullYear();
    if (lastQ < 0) { lastQ = 3; y -= 1; }
    var sm = lastQ*3 + 1;
    var em = lastQ*3 + 3;
    fromStr = y + "-" + String(sm).padStart(2,'0') + "-01";
    var endDate = new Date(y, em, 0);
    toStr = endDate.toISOString().slice(0,10);
  } else if (val === "all") {
    fromStr = "";
    toStr = "";
  }
  var dfEl = document.getElementById('expDateFrom');
  var dtEl = document.getElementById('expDateTo');
  if (dfEl) dfEl.value = fromStr;
  if (dtEl) dtEl.value = toStr;
  var f = _getExpFilt();
  f.dateFrom = fromStr;
  f.dateTo = toStr;
  window._expFilt = f;
  renderExpTable();
  renderStackChart();
  renderExpChart();
}

function clearExpCats(btn) {

  "#3b82f6","#ef4444","#22c55e","#f59e0b","#a855f7",
  "#14b8a6","#f97316","#ec4899","#6366f1","#84cc16",

];

function _stackColor(i) { return STACK_PALETTE[i % STACK_PALETTE.length]; }

function setStackGrouping(grp) {

async function renderStackChart() {
  var st = window._stackState || {grouping:"monthly"};
  var f = _getExpFilt();
  var params = new URLSearchParams();
  params.set('grouping', st.grouping);
  if (f.dateFrom) params.set('date_from', f.dateFrom);
  if (f.dateTo) params.set('date_to', f.dateTo);
  if (f.selectedCats && f.selectedCats.length) params.set('categories', f.selectedCats.join(','));

  var res;
  try {
    res = await fetch('/api/expenses/chart?' + params.toString()).then(function(r){return r.json()});
  } catch(e) { return; }

  var canvas = document.getElementById('expStackChart');
  if (!canvas) return;
  if (window._expStackChart && window._expStackChart.destroy) window._expStackChart.destroy();

  var labels = res.labels || [];
  var cats = res.categories || [];
  var datasets = cats.map(function(c, i){
    return {
      label: c,
      data: (res.datasets && res.datasets[c]) || [],
      backgroundColor: _stackColor(i),
      borderColor: _stackColor(i),
      borderWidth: 0,
    };
  });

  window._expStackChart = new Chart(canvas, {
    type: "bar",
    data: { labels: labels, datasets: datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { labels: { color: "#e5e7eb", font: { size: 11 } } },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              var v = ctx.parsed.y || 0;
              return ctx.dataset.label + ": EUR " + v.toLocaleString("de", {minimumFractionDigits: 2, maximumFractionDigits: 2});
            }
          }
        }
      },
      scales: {
        x: { stacked: true, ticks: { color: "#9ca3af", font: { size: 11 } }, grid: { color: "#2e3347" } },
        y: {
          stacked: true,
          beginAtZero: true,
          ticks: { color: "#9ca3af", callback: function(v){ return "EUR " + v.toLocaleString("de"); } },
          grid: { color: "#2e3347" }
        }
      }
    }
  });
}

function renderExpTable() {
  var d = window._expData;
  if (!d) return;
  var filt = _getExpFilt();
  var q = (filt.search || "").toLowerCase();
  var cats = filt.selectedCats || [];
  var df = filt.dateFrom || "";
  var dt = filt.dateTo || "";
  var rows = d.expenses.filter(function(e){
    if (cats.length && cats.indexOf(e.category) < 0) return false;
    if (df && (!e.date || e.date < df)) return false;
    if (dt && (!e.date || e.date > dt)) return false;
    if (q) {
      var hay = ((e.vendor||'') + ' ' + (e.notes||'') + ' ' + (e.description||'') + ' ' + (e.email_subject||'') + ' ' + (e.category||'')).toLowerCase();
      if (hay.indexOf(q) < 0) return false;
    }
    return true;
  });

  var totalAmt = 0;
  rows.forEach(function(e){
    totalAmt += (parseFloat(e.amount)||0) + (parseFloat(e.amount_vat)||0);
  });

  var html = rows.map(function(e){
    var net = parseFloat(e.amount)||0;
    var vatAmt = parseFloat(e.amount_vat)||0;
    var rec = parseFloat(e.vat_recoverable)||0;
    var nonRec = Math.max(0, vatAmt - rec);
    var color = rec > 0 && nonRec == 0 ? 'var(--green)' : rec > 0 && nonRec > 0 ? 'var(--yellow)' : 'var(--red)';
    var label = rec > 0 && nonRec == 0 ? '✓ Rec.' : rec > 0 && nonRec > 0 ? '◐ Partial' : '✗ None';
    var srcBadge = e.source ? '<span class="bank-chip">'+h(e.source)+'</span>' : '';
    var confirmed = e.status === 'confirmed';
    var vendorCell = (confirmed ? '<span style="color:var(--green);margin-right:4px" title="Confirmed">✓</span>' : '') + h(e.vendor||e.category||'');
    return '<tr class="exp-row" data-exp-id="'+h(e.id)+'" onclick="toggleExpDetail(this)" style="cursor:pointer">' +
      '<td>' + h(e.date||'') + '</td>' +
      '<td>' + vendorCell + '</td>' +
      '<td>' + h(e.category||'') + '</td>' +
      '<td class="amount">EUR ' + eur(net) + '</td>' +
      '<td class="amount">EUR ' + eur(vatAmt) + '</td>' +
      '<td class="amount" style="color:'+color+'">' + label + '</td>' +
      '<td class="amount">' + srcBadge + '</td>' +
      '</tr>' +
      '<tr class="exp-detail-row" data-detail-for="'+h(e.id)+'" style="display:none"><td colspan="7" style="padding:0;border:none">' +
      '<div class="tx-detail" id="exp-detail-'+h(e.id)+'" style="display:block;margin:0;padding:12px 14px;border-top:1px solid var(--border);background:var(--surface2)"></div>' +
      '</td></tr>';
  }).join('');
  if (!rows.length) html = '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:20px">No expenses match filters</td></tr>';
  setHTML("expTableBody", html);

  var countLine = document.getElementById("expCountLine");
  if (countLine) {
    countLine.textContent = "Showing " + rows.length + " expense" + (rows.length===1?"":"s") + " (EUR " + eur(totalAmt) + ")";
  }
}

function _findExpenseById(id) {
  var d = window._expData;
  if (!d) return null;
  var target = String(id);
  for (var i=0; i<d.expenses.length; i++) {
    if (String(d.expenses[i].id) === target) return d.expenses[i];

  return null;

  var confirmed = e.status === 'confirmed';

  lines.push('</div>');
  lines.push('<div style="font-size:12px;color:var(--text);line-height:1.7">');
  lines.push('<div><strong>Breakdown:</strong> Net EUR '+eur(net)+' + VAT EUR '+eur(vatAmt)+' ('+(rate*100).toFixed(0)+'%) = EUR '+eur(gross)+'</div>');
  lines.push('<div><strong>VAT recovery:</strong> EUR '+eur(rec)+' recoverable, EUR '+eur(nonRec)+' non-recoverable</div>');

  if (e.email_subject) lines.push('<div><strong>Email:</strong> '+h(e.email_subject)+'</div>');

  lines.push('</div>');

async function setExpStatus(id, status) {
  try {
    var res = await fetch('/api/expenses/'+encodeURIComponent(id)+'/status', {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({status: status})
    });
    if (!res.ok) throw new Error('status update failed');
    var e = _findExpenseById(id);
    if (e) e.status = status;
    renderExpTable();
    var detailRow = document.querySelector('tr.exp-detail-row[data-detail-for="'+String(id).replace(/"/g,'\\"')+'"]');
    if (detailRow) {
      detailRow.style.display = "";
      var panel = document.getElementById('exp-detail-'+id);
      if (panel) renderExpDetailPanel(panel, id);
    }
  } catch(err) {
    alert('Could not update status: '+err.message);
  }
}

var reconCache = null;
var reconFilt = {status:"all",bank:"all",period:"all",search:"",grouping:"quarterly"};

function sc(s) {
  if(!s) return "#6b7280";
  if(s.includes("MATCHED")) return "#22c55e";
  if(s.includes("MISSING - HIGH")) return "#ef4444";
  if(s.includes("MISSING - MEDIUM")) return "#f97316";
  if(s.includes("MISSING - LOW")) return "#f59e0b";
  if(s.includes("PENDING")) return "#f59e0b";
  if(s.includes("TESLA")) return "#f97316";
  if(s.includes("NO RECEIPT")) return "#3b82f6";
  return "#6b7280";
}
function sbg(s) {
  if(!s) return "rgba(107,114,128,.1)";
  if(s.includes("MATCHED")) return "rgba(34,197,94,.1)";
  if(s.includes("MISSING - HIGH")) return "rgba(239,68,68,.1)";
  if(s.includes("MISSING - MEDIUM")) return "rgba(249,115,22,.1)";
  if(s.includes("MISSING - LOW")) return "rgba(245,158,11,.1)";
  if(s.includes("PENDING")) return "rgba(245,158,11,.1)";
  if(s.includes("TESLA")) return "rgba(249,115,22,.1)";
  if(s.includes("NO RECEIPT")) return "rgba(59,130,246,.1)";
  return "rgba(107,114,128,.1)";
}

function reconAction(t) {
  var s = t.match_status||"";
  var desc = (t.description||"").toLowerCase();
  var amt = Math.abs(t.amount||0);
  var guidance = [];
  if (s.includes("MISSING - HIGH")) {
    guidance.push('<span style="color:var(--red);font-weight:600">\u26A0 HIGH PRIORITY</span>');
    if (amt > 1000) guidance.push('Large amount. Check email for invoice or request from vendor.');
    if (desc.includes('salary') || desc.includes('payroll')) guidance.push('Payroll/salary: mark as NO RECEIPT NEEDED.');
    if (desc.includes('transfer') || desc.includes('virement')) guidance.push('Internal transfer. Mark as NO RECEIPT NEEDED.');
    if (desc.includes('tax') || desc.includes('vat') || desc.includes('tva')) guidance.push('Tax payment. Get statement from tax authority portal.');
    if (desc.includes('social') || desc.includes('rsz') || desc.includes('cnss')) guidance.push('Social security. Check Securex portal for statement.');
    if (!guidance.length || guidance.length === 1) guidance.push('Search email for vendor invoice. If not found, request from vendor.');
  } else if (s.includes("MISSING - MEDIUM")) {
    guidance.push('<span style="color:var(--orange);font-weight:600">Action needed</span>');
    if (desc.includes('restaurant') || desc.includes('cafe')) guidance.push('Restaurant. Send receipt via Telegram bot @agila_receipts_bot.');
    if (desc.includes('hotel') || desc.includes('booking')) guidance.push('Hotel. Check email for confirmation or send receipt via Telegram bot.');
    if (desc.includes('amazon')) guidance.push('Amazon purchase. Download invoice from Amazon Orders page.');
    if (!guidance.length || guidance.length === 1) guidance.push('Look for invoice in email or request from vendor.');
  } else if (s.includes("MISSING - LOW")) {
    guidance.push('<span style="color:var(--yellow);font-weight:600">Low priority</span>');
    guidance.push('Small amount. Document reason if receipt unavailable.');
  } else if (s.includes("PENDING")) {
    guidance.push('<span style="color:var(--yellow);font-weight:600">Pending review</span>');
    guidance.push('Possible match found. Verify the linked expense matches this transaction.');
  } else if (s.includes("TESLA")) {
    guidance.push('<span style="color:var(--orange);font-weight:600">Tesla charging</span>');
    guidance.push('Download monthly statement from Tesla account or app.');
  } else if (s.includes("NO RECEIPT")) {
    guidance.push('<span style="color:var(--accent);font-weight:600">No receipt needed</span>');
    guidance.push('Internal transfer, salary, or non-expense item. No action required.');
  } else if (s.includes("MATCHED")) {
    guidance.push('<span style="color:var(--green);font-weight:600">\u2713 Matched</span>');
    guidance.push('Receipt on file. No action needed.');
  }
  return guidance;
}

async function loadBank() {
  if (reconCache) { renderRecon(); return; }
  reconCache = await fetch("/api/reconciliation").then(function(r){return r.json()});
  renderRecon();
}

function renderRecon() {
  var d = reconCache;
  var txns = d.transactions||[];
  var s = d.summary||{};
  var total = s.total||txns.length;
  var matched = s.matched||0;
  var pct = total>0 ? (matched/total*100) : 0;
  var mc = pct>=70?"positive":pct>=50?"warning":"negative";
  var missing = (s.missing||0)+(s.pending||0)+(s.tesla||0);
  var byS = {};
  txns.forEach(function(t){var k=t.match_status||"?";byS[k]=(byS[k]||0)+1});
  var mH=byS["MISSING - HIGH"]||0, mM=byS["MISSING - MEDIUM"]||0, mL=byS["MISSING - LOW"]||0;
  var pendingC=byS["PENDING"]||0;
  var teslaC=byS["TESLA - NEED MONTHLY STMT"]||s.tesla||0;
  var noRcpt=byS["NO RECEIPT NEEDED"]||s.no_receipt_needed||0;

  var periodKeys = Object.keys(d.by_period||{}).filter(function(p){return p && p!=="?"}).sort(function(a,b){
    var ya=parseInt(a.split(' ')[1]), yb=parseInt(b.split(' ')[1]);
    var qa=a.split(' ')[0], qb=b.split(' ')[0];
    if (ya!==yb) return ya-yb;
    return ['Q1','Q2','Q3','Q4'].indexOf(qa)-['Q1','Q2','Q3','Q4'].indexOf(qb);
  });
  var periodOpts = periodKeys.map(function(p){return '<option value="'+h(p)+'">'+h(p)+'</option>'}).join('');

  var bankKeys = Object.keys(d.by_bank||{}).filter(function(b){return b && b!=="?"}).sort();
  var bankOpts = bankKeys.map(function(b){return '<option value="'+h(b)+'">'+h(b)+'</option>'}).join('');

  var missingHigh = txns.filter(function(t){return (t.match_status||"").includes("MISSING - HIGH")});
  var missingMed = txns.filter(function(t){return (t.match_status||"").includes("MISSING - MEDIUM")});
  var pendingTx = txns.filter(function(t){return (t.match_status||"").includes("PENDING")});
  var teslaTx = txns.filter(function(t){return (t.match_status||"").includes("TESLA")});

  var actionItems = [];
  if (missingHigh.length) {
    var highTotal = missingHigh.reduce(function(a,t){return a+Math.abs(t.amount||0)},0);
    actionItems.push('<div class="card" style="border-left:3px solid var(--red)"><h3>\u26A0 Missing Receipts (High Priority)</h3><div class="value negative">'+missingHigh.length+' items</div><div class="sub">EUR '+eur(highTotal)+' total. Need receipts for VAT and audit compliance.</div></div>');
  }
  if (missingMed.length) {
    var medTotal = missingMed.reduce(function(a,t){return a+Math.abs(t.amount||0)},0);
    actionItems.push('<div class="card" style="border-left:3px solid var(--orange)"><h3>Missing Receipts (Medium)</h3><div class="value warning">'+missingMed.length+' items</div><div class="sub">EUR '+eur(medTotal)+' total. Check email or request from vendor.</div></div>');
  }
  if (pendingTx.length) {
    actionItems.push('<div class="card" style="border-left:3px solid var(--yellow)"><h3>Pending Review</h3><div class="value warning">'+pendingTx.length+' items</div><div class="sub">Possible matches found. Verify and confirm or reject.</div></div>');
  }
  if (teslaTx.length) {
    actionItems.push('<div class="card" style="border-left:3px solid var(--orange)"><h3>Tesla Charging</h3><div class="value warning">'+teslaTx.length+' items</div><div class="sub">Download monthly statements from Tesla app.</div></div>');
  }

  setHTML("tab-bank",
    '<div class="kpi-grid">' +
      '<div class="card"><h3>Match Rate</h3><div class="value '+mc+'">'+pct.toFixed(0)+'%</div><div class="sub">'+matched+'/'+total+' matched</div></div>' +
      '<div class="card"><h3>Action Needed</h3><div class="value '+(missing>0?"negative":"positive")+'">'+(mH+mM+pendingC+teslaC)+'</div><div class="sub">'+mH+' high, '+mM+' med, '+pendingC+' pending, '+teslaC+' tesla</div></div>' +
      '<div class="card"><h3>Low Priority</h3><div class="value warning">'+(mL+noRcpt)+'</div><div class="sub">'+mL+' low, '+noRcpt+' no receipt needed</div></div>' +
      '<div class="card"><h3>Matched</h3><div class="value positive">'+matched+'</div><div class="sub">fully reconciled</div></div>' +
    '</div>' +
    (actionItems.length ? '<div class="section-title">\u26A1 Action Required</div><div class="kpi-grid" style="grid-template-columns:1fr">'+actionItems.join('')+ '</div>' : '') +
    '<div class="section-title">Status by Period</div>' +
    '<div class="filter-bar" style="margin-bottom:8px">' +
      '<button class="filter-btn active" data-rgrp="quarterly" onclick="setReconGroup(this)">Quarterly</button>' +
      '<button class="filter-btn" data-rgrp="monthly" onclick="setReconGroup(this)">Monthly</button>' +
    '</div>' +
    '<div class="chart-wrap" style="height:320px"><canvas id="reconChart"></canvas></div>' +
    '<div class="section-title">Filters</div>' +
    '<div class="exp-filters">' +
      '<label>Bank<select class="filter-sel" id="reconBank" onchange="setReconFilt()"><option value="all">All Banks</option>'+bankOpts+'</select></label>' +
      '<label>Period<select class="filter-sel" id="reconPeriod" onchange="setReconFilt()"><option value="all">All Periods</option>'+periodOpts+'</select></label>' +
      '<label class="search-cell">Search<input id="reconSearch" oninput="setReconFilt()" placeholder="Description, vendor, notes..."></label>' +
    '</div>' +
    '<div class="filter-bar" id="reconStatusPills">' +
      '<button class="filter-btn active" data-status="all" onclick="setReconStatus(this)">All ('+total+')</button>' +
      '<button class="filter-btn" data-status="missing" onclick="setReconStatus(this)" style="border-color:var(--red)">\u26A0 Missing ('+(mH+mM+mL)+')</button>' +
      '<button class="filter-btn" data-status="pending" onclick="setReconStatus(this)" style="border-color:var(--yellow)">\u23F3 Pending ('+pendingC+')</button>' +
      '<button class="filter-btn" data-status="tesla" onclick="setReconStatus(this)" style="border-color:var(--orange)">\u26A1 Tesla ('+teslaC+')</button>' +
      '<button class="filter-btn" data-status="matched" onclick="setReconStatus(this)" style="border-color:var(--green)">\u2713 Matched ('+matched+')</button>' +
      '<button class="filter-btn" data-status="noreceipt" onclick="setReconStatus(this)" style="border-color:var(--accent)">No Receipt ('+noRcpt+')</button>' +
    '</div>' +
    '<div id="reconCountLine" style="font-size:12px;color:var(--muted);margin-bottom:8px"></div>' +
    '<div id="recon-list"></div>');

  // Stacked bar chart by period
  var chartCanvas = document.getElementById('reconChart');
  if (chartCanvas) {
    var grp = reconFilt.grouping || 'quarterly';
    // Group transactions by period
    var periodMap = {};
    txns.forEach(function(t) {
      var dt = t.date || '';
      var key;
      if (grp === 'monthly') {
        key = dt.substring(0,7) || '?'; // YYYY-MM
      } else {
        var y = dt.substring(0,4), m = parseInt(dt.substring(5,7)||'0');
        key = y && m ? y + ' Q' + Math.ceil(m/3) : '?';
      }
      if (!periodMap[key]) periodMap[key] = {matched:0, missingH:0, missingM:0, missingL:0, pending:0, tesla:0, noreceipt:0};
      var ms = t.match_status || '';
      if (ms.includes('MATCHED')) periodMap[key].matched++;
      else if (ms.includes('MISSING - HIGH')) periodMap[key].missingH++;
      else if (ms.includes('MISSING - MEDIUM')) periodMap[key].missingM++;
      else if (ms.includes('MISSING - LOW')) periodMap[key].missingL++;
      else if (ms.includes('PENDING')) periodMap[key].pending++;
      else if (ms.includes('TESLA')) periodMap[key].tesla++;
      else if (ms.includes('NO RECEIPT')) periodMap[key].noreceipt++;
    });
    var labels = Object.keys(periodMap).sort();
    var datasets = [
      {label:'Matched', data:labels.map(function(l){return periodMap[l].matched}), backgroundColor:'#22c55e'},
      {label:'Missing High', data:labels.map(function(l){return periodMap[l].missingH}), backgroundColor:'#ef4444'},
      {label:'Missing Med', data:labels.map(function(l){return periodMap[l].missingM}), backgroundColor:'#f97316'},
      {label:'Missing Low', data:labels.map(function(l){return periodMap[l].missingL}), backgroundColor:'#f59e0b'},
      {label:'Pending', data:labels.map(function(l){return periodMap[l].pending}), backgroundColor:'#eab308'},
      {label:'Tesla', data:labels.map(function(l){return periodMap[l].tesla}), backgroundColor:'#8b5cf6'},
      {label:'No Receipt', data:labels.map(function(l){return periodMap[l].noreceipt}), backgroundColor:'#3b82f6'},
    ].filter(function(ds){return ds.data.some(function(v){return v>0})});

    if (window._reconChart) window._reconChart.destroy();
    window._reconChart = new Chart(chartCanvas, {
      type:'bar',
      data:{labels:labels, datasets:datasets},
      options:{
        responsive:true, maintainAspectRatio:false,
        scales:{
          x:{stacked:true, ticks:{color:'#94a3b8', font:{size:11}}, grid:{display:false}},
          y:{stacked:true, ticks:{color:'#94a3b8', stepSize:5}, grid:{color:'#1e293b'}}
        },
        plugins:{
          legend:{position:'bottom', labels:{color:'#94a3b8', padding:8, font:{size:10}, boxWidth:12}},
          tooltip:{mode:'index', intersect:false}
        }
      }
    });
  }

  renderReconTxns();
}

function setReconGroup(btn) {
  document.querySelectorAll('[data-rgrp]').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  reconFilt.grouping = btn.getAttribute('data-rgrp');
  renderRecon();
}

function setReconStatus(btn) {
  document.querySelectorAll('#reconStatusPills .filter-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  reconFilt.status = btn.getAttribute('data-status');
  renderReconTxns();
}

function setReconFilt() {
  var bEl = document.getElementById('reconBank');
  var pEl = document.getElementById('reconPeriod');
  var sEl = document.getElementById('reconSearch');
  reconFilt.bank = bEl ? bEl.value : 'all';
  reconFilt.period = pEl ? pEl.value : 'all';
  reconFilt.search = sEl ? sEl.value.toLowerCase() : '';
  renderReconTxns();
}

function renderReconTxns() {
  var txns = reconCache ? reconCache.transactions||[] : [];
  var f = reconFilt;
  var filtered = txns.filter(function(t) {
    var ms = t.match_status||"";
    if (f.status==='matched' && !ms.includes('MATCHED')) return false;
    if (f.status==='missing' && !ms.includes('MISSING')) return false;
    if (f.status==='pending' && !ms.includes('PENDING')) return false;
    if (f.status==='tesla' && !ms.includes('TESLA')) return false;
    if (f.status==='noreceipt' && ms !== 'NO RECEIPT NEEDED') return false;
    if (f.bank!=='all' && t.bank!==f.bank) return false;
    if (f.period!=='all' && t.period!==f.period) return false;
    if (f.search) {
      var hay = ((t.description||'') + ' ' + (t.notes||'') + ' ' + (t.bank||'')).toLowerCase();
      if (hay.indexOf(f.search) < 0) return false;
    }
    return true;
  });

  var list = document.getElementById("recon-list");
  if (!list) return;

  var totalAmt = filtered.reduce(function(a,t){return a + Math.abs(t.amount||0)},0);
  var countLine = document.getElementById('reconCountLine');
  if (countLine) countLine.textContent = 'Showing ' + filtered.length + ' transaction' + (filtered.length===1?'':'s') + ' (EUR ' + eur(totalAmt) + ' total)';

  if (!filtered.length) { setHTML(list, '<div class="empty-state">No transactions match filters</div>'); return; }
  setHTML(list, filtered.map(function(t) {
    var amt = t.amount||0;
    var c = sc(t.match_status);
    var bg = sbg(t.match_status);
    var receipt = t.receipt_file && t.receipt_file!="-" ? h(t.receipt_file) : "";
    var actions = reconAction(t);
    var actionHtml = actions.map(function(a){return '<div style="font-size:12px;line-height:1.6">'+a+'</div>'}).join('');
    var notes = h(t.notes||"");
    return '<div class="tx-row" onclick="toggleReconDetail(this)" style="border-left:3px solid '+c+';background:'+bg+'">' +
      '<div class="tx-main">' +
        '<div class="tx-left"><span class="dot" style="background:'+c+'"></span><span class="tx-date">'+h(t.date||"")+'</span><span class="tx-desc">'+h(t.description||"")+'</span></div>' +
        '<span class="tx-amount" style="color:'+(amt<0?"var(--red)":"var(--green)")+'">'+(amt<0?"-":"")+'EUR '+Math.abs(amt).toFixed(2)+'</span>' +
      '</div>' +
      '<div style="margin-top:4px">' +
        '<span class="tx-badge" style="background:'+bg+';color:'+c+';border:1px solid '+c+'40">'+h(t.match_status||"")+'</span>' +
        '<span class="bank-chip">'+h(t.bank||"")+'</span>' +
        (receipt ? '<span class="bank-chip">'+receipt+'</span>' : '') +
      '</div>' +
      '<div class="tx-detail" style="display:none">' +
        (notes ? '<div style="margin-bottom:6px"><strong>Notes:</strong> '+notes+'</div>' : '') +
        '<div style="margin-bottom:6px"><strong>Guidance:</strong></div>' +
        actionHtml +
        '<div style="margin-top:8px;font-size:10px;color:var(--muted)">Period: '+h(t.period||"")+' | Bank: '+h(t.bank||"")+' | Source: '+h(t.source_table||"")+'</div>' +
      '</div>' +
    '</div>';
  }).join(""));
}

function toggleReconDetail(el) {
  var d = el.querySelector(".tx-detail");
  d.style.display = d.style.display==="none"||!d.style.display?"block":"none";
}
